schema_version: "1.0"

# Template-level behavior switches inherited by repositories created from
# ai-template. Copy this file into downstream repositories to opt in/out.
behavior_switches:
  provenance_story:
    # Master switch for the "Totally True and Not At All Embellished History"
    # convention.
    enabled: true

    # If true, README updates are expected to include the PROVENANCE section.
    require_readme_section: true

    # If true, keep chronicle links/table updates in sync across repositories.
    update_chronicle: true

  responsible_vibe_workflow:
    # Enables structured workflow guidance provided by responsible-vibe skills.
    enabled: true
