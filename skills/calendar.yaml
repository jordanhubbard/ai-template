schema_version: "1.0"
kind: Skill
metadata:
  name: calendar
  version: "1.0.0"
  description: "Create, read, update, and delete calendar events"
  tags:
    - calendar
    - scheduling
    - events
    - time-management

spec:
  display_name: "Calendar"
  description: |
    Manages calendar events in a connected calendar service. Supports creating
    new events with attendees and reminders, listing upcoming events within a
    date range, reading event details, updating event properties, and deleting
    events. Use this skill to schedule meetings, set reminders, or check
    availability.

  parameters:
    type: object
    properties:
      action:
        type: string
        description: "The calendar action to perform"
        enum:
          - create
          - list
          - read
          - update
          - delete
      event_id:
        type: string
        description: "Unique identifier of the event (required for 'read', 'update', 'delete')"
      title:
        type: string
        description: "Event title or summary (required for 'create')"
      description:
        type: string
        description: "Optional detailed description of the event"
      start_time:
        type: string
        description: "ISO 8601 start datetime of the event (required for 'create')"
      end_time:
        type: string
        description: "ISO 8601 end datetime of the event (required for 'create')"
      timezone:
        type: string
        description: "IANA timezone identifier for the event (e.g., 'America/New_York')"
        default: "UTC"
      attendees:
        type: array
        description: "List of attendee email addresses"
        items:
          type: string
      location:
        type: string
        description: "Physical or virtual location of the event"
      reminder_minutes:
        type: integer
        description: "Minutes before the event to send a reminder notification"
      range_start:
        type: string
        description: "ISO 8601 start of the date range when listing events"
      range_end:
        type: string
        description: "ISO 8601 end of the date range when listing events"
    required:
      - action

  returns:
    type: object
    properties:
      success:
        type: boolean
        description: "Whether the action completed successfully"
      event:
        type: object
        description: "Created or retrieved event details"
        properties:
          id:
            type: string
            description: "Unique event identifier"
          title:
            type: string
            description: "Event title"
          start_time:
            type: string
            description: "ISO 8601 start datetime"
          end_time:
            type: string
            description: "ISO 8601 end datetime"
          attendees:
            type: array
            items:
              type: string
          location:
            type: string
      events:
        type: array
        description: "List of events when action is 'list'"
        items:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            start_time:
              type: string
            end_time:
              type: string
